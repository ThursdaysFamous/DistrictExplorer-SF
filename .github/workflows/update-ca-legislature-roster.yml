name: Update CA State Legislature roster

# Weekly refresh of the ca-senate / ca-assembly card rosters
# (data/app/ca-senate-members.json, data/app/ca-assembly-members.json, fetched by
# index.html). Rebuilds both chambers from the OpenStates bulk people export and,
# if anything changed, opens a PR rather than committing directly to main —
# officeholder data should get a human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 2" # Tuesday 13:00 UTC (staggered from the congress refresh)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # No third-party deps: the builder downloads the canonical OpenStates
      # ca.csv with stdlib urllib and splits it into the two chambers.
      - name: Rebuild CA legislature roster data files
        run: python3 scripts/build_ca_legislature_roster.py

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/ca-senate-members.json data/app/ca-assembly-members.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/ca-legislature-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/ca-senate-members.json data/app/ca-assembly-members.json
          git commit -m "Update CA State Legislature roster from OpenStates"
          git push -u origin "$branch" --force
          # Only open a PR if one isn't already open for this branch; if it is,
          # the force-push above already updated it.
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update CA State Legislature roster from OpenStates" \
              --body "Automated weekly refresh of the ca-senate / ca-assembly district card rosters, generated by \`scripts/build_ca_legislature_roster.py\` from the OpenStates bulk people export. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
