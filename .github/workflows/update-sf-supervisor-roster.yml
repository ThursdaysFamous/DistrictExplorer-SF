name: Update SF Board of Supervisors roster

# Weekly refresh of the supervisor-district card's roster
# (data/app/sf-supervisor-members.json, fetched by index.html). Rebuilds the
# current supervisor per district from DataSF's "Current Supervisor Districts"
# (hcgx-vtsb) and, if anything changed, opens a PR rather than committing
# directly to main — officeholder data should get a human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 3" # Wednesday 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # No third-party deps: the builder downloads the hcgx-vtsb rows with
      # stdlib urllib and keys sup_name by sup_dist_num.
      - name: Rebuild SF supervisor roster data file
        run: python3 scripts/build_sf_supervisor_roster.py

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/sf-supervisor-members.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/sf-supervisor-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/sf-supervisor-members.json
          git commit -m "Update SF Board of Supervisors roster from DataSF hcgx-vtsb"
          git push -u origin "$branch" --force
          # Only open a PR if one isn't already open for this branch; if it is,
          # the force-push above already updated it.
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update SF Board of Supervisors roster from DataSF hcgx-vtsb" \
              --body "Automated weekly refresh of the supervisor-district card's roster, generated by \`scripts/build_sf_supervisor_roster.py\` from DataSF's Current Supervisor Districts (hcgx-vtsb). Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
