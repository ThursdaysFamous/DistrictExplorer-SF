name: Update IL Senate/House roster

# Weekly refresh of the IL Senate/House district cards' roster
# (data/app/il-senate-members.json / il-house-members.json, fetched by
# index.html). Re-scrapes ilga.gov and, if anything changed, opens a PR
# rather than committing directly to main — officeholder data should get a
# human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 1" # Monday 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        # Version-pinned via scripts/requirements.txt (constraints), but only the
        # two packages this job needs — no Playwright/Chromium (that's CPD-only).
        run: pip install -c scripts/requirements.txt requests beautifulsoup4

      - name: Scrape ILGA member rosters
        run: python3 scripts/ilga_scraper.py --chamber both --out /tmp/ilga_network.json

      - name: Rebuild roster data files
        run: python3 scripts/build_il_roster.py /tmp/ilga_network.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/ilga-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/il-senate-members.json data/app/il-house-members.json
          git commit -m "Update IL Senate/House roster from ilga.gov"
          git push -u origin "$branch" --force
          # Only open a PR if one isn't already open for this branch; if it is,
          # the force-push above already updated it.
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update IL Senate/House roster from ilga.gov" \
              --body "Automated weekly refresh of the IL Senate/House district cards' embedded roster, generated by \`scripts/ilga_scraper.py\` + \`scripts/build_il_roster.py\` from ilga.gov. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
