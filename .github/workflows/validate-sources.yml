name: Validate layer sources

# Monthly freshness check for the data sources index.html depends on.
# Unlike the roster workflows (which re-scrape the same page), this catches the
# other failure mode: a publisher silently superseding a dataset with a newer
# one — Chicago Data Portal (Socrata) datasets are re-published under a NEW id
# every year, so a hardcoded id keeps serving last year's data with no error.
#
# scripts/validate_sources.py never edits the app (swapping a dataset id is a
# schema-sensitive judgement call). When it finds drift it exits with a WARN/FAIL
# status; this workflow then opens — or updates in place — a single tracking
# issue so a human reviews it. The job itself stays green: the issue is the
# signal, matching the roster pattern of "officeholder/source changes get a
# human look before they ship."

on:
  schedule:
    - cron: "0 14 1 * *" # 1st of the month, 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  validate-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        # Only requests is needed (no BeautifulSoup/Playwright); pinned via
        # scripts/requirements.txt.
        run: pip install -c scripts/requirements.txt requests

      - name: Validate layer sources
        id: validate
        # continue-on-error: a FAIL exit (1) must not red the job — per the
        # project's "surface for a human, don't block" convention, the tracking
        # issue below is the signal. status.txt carries ok|warn|fail.
        continue-on-error: true
        run: |
          python3 scripts/validate_sources.py \
            --report source-report.md \
            --status-file status.txt
          echo "status=$(cat status.txt)" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.validate.outputs.status != 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Layer source drift detected — review needed"
          # Prepend a short header so the issue explains itself, then the report.
          {
            echo "_Automated by \`.github/workflows/validate-sources.yml\` on $(date -u +%Y-%m-%d). Nothing was changed in the app — review each item, then update \`index.html\` (dataset ids) or re-download the boundary shapefile as needed. Close this issue once addressed; it will reopen/refresh on the next run if drift remains._"
            echo
            cat source-report.md
          } > issue-body.md

          existing="$(gh issue list --state open --search "in:title $title" --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file issue-body.md
            gh issue comment "$existing" --body "Refreshed by the monthly source-validation run — see the updated issue body for the current status."
            echo "Updated existing issue #$existing."
          else
            gh issue create --title "$title" --body-file issue-body.md
            echo "Opened a new tracking issue."
          fi
