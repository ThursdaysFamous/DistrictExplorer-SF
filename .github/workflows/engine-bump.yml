name: Engine bump

# Consumes the `engine-release` repository_dispatch fanned out by the Chicago
# repo's release-engine.yml (docs/MECHANIZATION_PLAYBOOK.md Conversion 1; NYC
# work order 1.3). The payload carries engine_version + sha256 — nothing else.
#
# On each release: update engine.lock.json from the payload, refresh the
# shared scripts from the release assets (the release tarball IS the
# distribution channel for shared scripts — apply_engine.py,
# check_engine_parity.py, generate_metro_files.py, and the metro-worksheet
# schema arrive with every bump), splice the pinned engine
# into index.html/sw.js, re-run the static and behaviour gates, then open a
# PR on the fixed branch bot/engine-bump — force-push + `gh pr list`
# duplicate guard, the same pattern as the five roster workflows. A human
# reviews and merges; nothing lands on main automatically.
#
# repository_dispatch only triggers workflows on the DEFAULT branch — this
# file must live on main to fire (a copy parked on a feature branch never
# runs). A re-dispatch of the version already pinned is a no-op: the diff
# gate below skips the PR step.

on:
  repository_dispatch:
    types: [engine-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update engine.lock.json from the dispatch payload
        env:
          ENGINE_VERSION: ${{ github.event.client_payload.engine_version }}
          ENGINE_SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          if [ -z "$ENGINE_VERSION" ] || [ -z "$ENGINE_SHA256" ]; then
            echo "::error::dispatch payload is missing engine_version and/or sha256"
            exit 1
          fi
          jq --arg v "$ENGINE_VERSION" --arg s "$ENGINE_SHA256" \
            '.engine_version = $v | .sha256 = $s' engine.lock.json > engine.lock.json.tmp
          mv engine.lock.json.tmp engine.lock.json
          cat engine.lock.json

      # The TWO spaces between hash and filename are load-bearing — a single
      # space breaks `sha256sum --check` parsing. CHI is public, so the
      # built-in token suffices for the release download.
      - name: Fetch release assets, refresh shared scripts, verify hash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="$(jq -r .engine_version engine.lock.json)"
          gh release download "$ver" \
            --repo ThursdaysFamous/DistrictExplorer-CHI \
            --pattern 'engine.bundle.js' --pattern 'engine.manifest.json' \
            --pattern 'apply_engine.py' --pattern 'check_engine_parity.py' \
            --pattern 'generate_metro_files.py' --pattern 'metro-worksheet.schema.json' \
            --clobber
          echo "$(jq -r .sha256 engine.lock.json)  engine.bundle.js" | sha256sum --check -
          mv -f apply_engine.py check_engine_parity.py generate_metro_files.py scripts/
          mv -f metro-worksheet.schema.json schema/

      - name: Apply engine + static merge gate
        run: |
          python3 scripts/apply_engine.py
          python3 scripts/validate_index.py index.html

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Same pinned toolchain as smoke-test.yml. The behaviour gate runs here
      # because the bumped tree (new engine blocks) is what the PR proposes to
      # ship; the PR's own smoke-test run then re-confirms it.
      - name: Install Playwright + Chromium
        run: |
          npm install playwright@1.56.1
          npx playwright install --with-deps chromium

      - name: Serve bumped app and run smoke test
        env:
          BASE_URL: http://localhost:8000/
        run: |
          python3 -m http.server 8000 &
          server_pid=$!
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/ >/dev/null && break
            sleep 0.5
          done
          node scripts/smoke_test.mjs
          status=$?
          kill "$server_pid" 2>/dev/null || true
          exit $status

      - name: Check for changes
        id: diff
        run: git diff --quiet -- engine.lock.json scripts/apply_engine.py scripts/check_engine_parity.py scripts/generate_metro_files.py schema/metro-worksheet.schema.json index.html sw.js && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ENGINE_VERSION: ${{ github.event.client_payload.engine_version }}
        run: |
          branch="bot/engine-bump"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add engine.lock.json scripts/apply_engine.py scripts/check_engine_parity.py scripts/generate_metro_files.py schema/metro-worksheet.schema.json index.html sw.js
          git commit -m "Bump engine to $ENGINE_VERSION"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create --title "Bump engine to $ENGINE_VERSION" \
              --body "Automated engine bump from the Chicago repo's \`engine-release\` dispatch (\`docs/MECHANIZATION_PLAYBOOK.md\` Conversion 1). Updates \`engine.lock.json\`, refreshes the shared scripts from the release assets, and splices the hash-verified ENGINE blocks into \`index.html\`/\`sw.js\`. The static and behaviour gates passed on the bumped tree in the dispatch run. Review before merging — this changes the shared engine this fork deploys." \
              --base main --head "$branch"
          fi
