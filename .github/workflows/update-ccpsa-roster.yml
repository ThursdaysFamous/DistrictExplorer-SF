name: Update CCPSA District Council roster

# Weekly refresh of the CCPSA District Council card's elected-Councilor roster
# (data/app/ccpsa-district-councils.json, fetched by index.html). Re-scrapes
# ccpsa.chicago.gov's per-council pages and, if anything changed, opens a PR
# rather than committing directly to main — officeholder data should get a
# human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 3" # Wednesday 13:00 UTC (staggered from the Monday ILGA / Tuesday CPD jobs)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        # Version-pinned via scripts/requirements.txt (constraints), but only the
        # two packages this job needs — ccpsa.chicago.gov is not Cloudflare-fronted,
        # so no Playwright/Chromium (that's CPD-only).
        run: pip install -c scripts/requirements.txt requests beautifulsoup4

      - name: Scrape CCPSA district-council Councilor rosters
        run: python3 scripts/ccpsa_scraper.py --out /tmp/ccpsa_district_councils.json

      - name: Rebuild roster data file
        run: python3 scripts/build_ccpsa_roster.py /tmp/ccpsa_district_councils.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/ccpsa-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/ccpsa-district-councils.json
          git commit -m "Update CCPSA District Council roster from ccpsa.chicago.gov"
          git push -u origin "$branch" --force
          # Only open a PR if one isn't already open for this branch; if it is,
          # the force-push above already updated it.
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update CCPSA District Council roster from ccpsa.chicago.gov" \
              --body "Automated weekly refresh of the CCPSA District Council cards' elected-Councilor roster, generated by \`scripts/ccpsa_scraper.py\` + \`scripts/build_ccpsa_roster.py\` from ccpsa.chicago.gov's per-council pages. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
