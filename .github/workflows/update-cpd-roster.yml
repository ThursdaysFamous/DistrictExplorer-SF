name: Update CPD district commander/contact roster

# Weekly refresh of the Police District card's commander/CAPS/station-address
# roster (data/app/cpd-district-info.json, fetched by index.html). Re-scrapes
# CPD's per-district pages and, if anything changed, opens a PR rather than
# committing directly to main — officeholder data should get a human look
# before it ships.

on:
  schedule:
    - cron: "0 13 * * 2" # Tuesday 13:00 UTC (staggered from the Monday ILGA job)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        run: pip install -r scripts/requirements.txt

      # CPD fronts its per-district pages with Cloudflare's managed (JS)
      # challenge, which 403s a plain requests client. The scraper's default
      # --engine auto falls back to a real headless Chromium to clear it, so
      # Chromium must be present (playbook R11).
      - name: Install Chromium for Playwright
        run: python3 -m playwright install --with-deps chromium

      - name: Scrape CPD district commander/contact pages
        run: python3 scripts/cpd_district_scraper.py --out /tmp/cpd_district_info.json

      - name: Rebuild roster data file
        run: python3 scripts/build_cpd_roster.py /tmp/cpd_district_info.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present
      # and well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/cpd-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/cpd-district-info.json
          git commit -m "Update CPD district commander/contact roster"
          git push -u origin "$branch" --force
          # Only open a PR if one isn't already open for this branch; if it is,
          # the force-push above already updated it.
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update CPD district commander/contact roster" \
              --body "Automated weekly refresh of the Police District cards' embedded commander/CAPS/station-address roster, generated by \`scripts/cpd_district_scraper.py\` + \`scripts/build_cpd_roster.py\` from chicagopolice.org's per-district pages. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
