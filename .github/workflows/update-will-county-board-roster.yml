name: Update Will County Board roster

# Weekly refresh of the Will County Board District card's member roster
# (data/app/will-county-board-members.json, fetched by index.html). Re-scrapes
# willcountyboard.com's member index + per-member profile pages (names, cities,
# roles, phones, committee assignments, and Cloudflare-obfuscated emails) and,
# if anything changed, opens a PR rather than committing directly to main —
# officeholder data should get a human look before it ships.

on:
  schedule:
    - cron: "0 13 * * 4" # Thursday 13:00 UTC (staggered from Mon ILGA/congress, Tue CPD, Wed CCPSA)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install scraper dependencies
        # Version-pinned via scripts/requirements.txt (constraints); only the two
        # packages this job needs — willcountyboard.com is static HTML (no
        # Cloudflare managed challenge on the pages), so no Playwright/Chromium.
        run: pip install -c scripts/requirements.txt requests beautifulsoup4

      - name: Scrape Will County Board member roster
        run: python3 scripts/will_county_board_scraper.py /tmp/will_county_board_raw.json

      - name: Rebuild roster data file
        run: python3 scripts/build_will_county_board_roster.py /tmp/will_county_board_raw.json

      # Gate the regenerated data before it can reach a PR: the app must still
      # parse and carry every layer, and every data/app file must be present and
      # well formed. node is preinstalled on ubuntu-latest.
      - name: Validate app + data files
        run: python3 scripts/validate_index.py index.html

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- data/app/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fixed branch (not per-run): an unmerged roster PR is refreshed in
          # place by the force-push below instead of spawning a duplicate PR
          # every week.
          branch="bot/will-county-board-roster-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/app/will-county-board-members.json
          git commit -m "Update Will County Board roster from willcountyboard.com"
          git push -u origin "$branch" --force
          if [ -z "$(gh pr list --head "$branch" --state open --json number --jq '.[].number')" ]; then
            gh pr create \
              --title "Update Will County Board roster from willcountyboard.com" \
              --body "Automated weekly refresh of the Will County Board District card's member roster (names, cities, roles, phones, committees, emails), generated by \`scripts/will_county_board_scraper.py\` + \`scripts/build_will_county_board_roster.py\` from willcountyboard.com. Please review the diff before merging — this changes data about real officeholders." \
              --base main \
              --head "$branch"
          else
            echo "PR already open for $branch; force-push refreshed it."
          fi
